name: Security & Isolation Verification

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'

    - name: Install Dependencies
      run: npm ci

    - name: Check for Committed Secrets (.env or local.db)
      run: |
        git ls-files | grep -E '^(\.env|local\.db)$' && { echo "CRITICAL: Sensitive files (.env or local.db) are tracked in git!" && exit 1; } || echo "✓ No sensitive files tracked in git."

    - name: Run TypeScript Compile Check
      run: npx tsc --noEmit

    - name: Run Tenant Isolation Integration Tests
      run: npx tsx src/lib/tests/tenant-isolation.test.ts
